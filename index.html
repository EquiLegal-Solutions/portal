<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
    <div class="flex items-center justify-between mb-4">
        <div>
            <span class="text-[10px] font-black bg-indigo-100 text-indigo-700 px-2 py-1 rounded mb-2 inline-block uppercase">Filing Due</span>
            <h4 class="font-bold text-lg text-slate-800">Ambala Central Jail - Premature Release</h4>
            <p class="text-sm text-slate-400 font-medium">Drafting: Haryana Release Policy 2002</p>
        </div>
        <div id="statusIcon" class="text-slate-200">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        </div>
    </div>
    
    <input type="file" id="fileInput" class="hidden" onchange="simulateUpload()">
    
    <div id="uploadArea">
        <button onclick="document.getElementById('fileInput').click()" class="w-full bg-slate-900 text-white text-xs font-black py-4 rounded-2xl hover:bg-indigo-600 transition-all uppercase tracking-widest">
            Select Petition Draft (.pdf)
        </button>
    </div>

    <div id="progressWrapper" class="hidden mt-4">
        <div class="flex justify-between mb-1 text-[10px] font-bold uppercase text-slate-400">
            <span>Uploading to Senior Counsel...</span>
            <span id="percent">0%</span>
        </div>
        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
            <div id="progressBar" class="bg-indigo-600 h-full w-0 transition-all duration-300"></div>
        </div>
    </div>
</div>

<script>
function simulateUpload() {
    const wrapper = document.getElementById('progressWrapper');
    const bar = document.getElementById('progressBar');
    const percent = document.getElementById('percent');
    const uploadArea = document.getElementById('uploadArea');
    const statusIcon = document.getElementById('statusIcon');

    wrapper.classList.remove('hidden');
    uploadArea.classList.add('hidden');

    let width = 0;
    let interval = setInterval(() => {
        if (width >= 100) {
            clearInterval(interval);
            percent.innerText = "UPLOAD COMPLETE";
            percent.classList.add('text-green-600');
            statusIcon.classList.remove('text-slate-200');
            statusIcon.classList.add('text-green-500');
            // Reset for demo after 2 seconds
            setTimeout(() => {
                alert("Draft successfully sent to Adv. Amandeep Singh for review.");
            }, 500);
        } else {
            width += Math.floor(Math.random() * 10) + 5;
            if(width > 100) width = 100;
            bar.style.width = width + '%';
            percent.innerText = width + '%';
        }
    }, 200);
}
</script>
